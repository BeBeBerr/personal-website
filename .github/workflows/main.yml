name: Website-Deploy-CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare deploy bundle
        run: mv dist personal-website

      - name: Install deploy tools
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Ensure remote directory exists
        env:
          SSH_HOST: ${{ secrets.host }}
          SSH_USERNAME: ${{ secrets.username }}
          SSH_PASSWORD: ${{ secrets.password }}
        run: |
          sshpass -p "$SSH_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            "$SSH_USERNAME@$SSH_HOST" \
            "mkdir -p /home/wangluyuan/personal-website"

      - name: Deploy with rsync
        env:
          SSH_HOST: ${{ secrets.host }}
          SSH_USERNAME: ${{ secrets.username }}
          SSH_PASSWORD: ${{ secrets.password }}
        run: |
          sshpass -p "$SSH_PASSWORD" rsync -az --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            personal-website/ \
            "$SSH_USERNAME@$SSH_HOST:/home/wangluyuan/personal-website/"
